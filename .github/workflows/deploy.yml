# GitHub Pages へ自動デプロイするワークフロー
# main ブランチに push されるたびに、ビルドして公開する
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 手動実行も可能

# Pages へ書き込むための権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に複数走らないようにする
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # 1) ビルド
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # 2) 公開
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
