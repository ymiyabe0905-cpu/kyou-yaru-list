<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- スマホで見やすくするための設定（iPhoneのノッチ部分まで使う） -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#5e3c1c" />
    <title>今日やるリスト</title>

    <!-- アプリのアイコン（ダイヤの剣） -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iPhoneで「ホーム画面に追加」すると、本物のアプリのように全画面で開く -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="今日やるリスト" />

    <!--
      フォントの方針:
      - 見出し・ボタン: DotGothic16（ドット絵風フォント＝マイクラっぽさ）
        → public/fonts にファイルを同梱し、CSSの @font-face で読み込むので
          インターネット接続は不要（完全オフラインで動く）。
      - 本文・期限: 標準の見やすいゴシック（CSS側でsystem-uiを指定）
    -->
  </head>
  <body>
    <!-- React がここに描画されます -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
